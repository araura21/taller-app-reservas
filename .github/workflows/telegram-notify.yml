name: Telegram Notify

# Entregable del taller: notificación vía Telegram en cada push.
# En CI la notificación principal la envía sonarqube.yml con métricas SAST.
# Este workflow sirve como respaldo en push y para pruebas manuales.

on:
  workflow_dispatch:

jobs:
  notify:
    name: Notificar commit en Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Obtener archivos modificados
        id: files
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -15 || git show --name-only --pretty=format: HEAD | head -15)
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Enviar notificacion a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Prueba manual' }}
          CHANGED_FILES: ${{ steps.files.outputs.changed_files }}
          ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_TXT: "PRUEBA MANUAL"
        run: |
          chmod +x tools/telegram-notify.sh
          ./tools/telegram-notify.sh
