name: Telegram Notify

on:
  push:
    branches:
      - main
      - develop

jobs:
  notify:
    name: Notificar commit en Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Obtener archivos modificados
        id: files
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | head -20)
          else
            FILES=$(git diff --name-only "${{ github.event.before }}" HEAD | head -20)
          fi
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Consultar resultado de SonarQube (opcional)
        id: sonar
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          STATUS=$(curl -sf -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=reservas-ec" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('projectStatus',{}).get('status','UNKNOWN'))")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Enviar notificación a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          CHANGED_FILES: ${{ steps.files.outputs.changed_files }}
          SONAR_QUALITY_GATE_STATUS: ${{ steps.sonar.outputs.status == 'OK' && 'OK' || steps.sonar.outputs.status == 'ERROR' && 'FAILED' || '' }}
        run: |
          chmod +x tools/telegram-notify.sh
          ./tools/telegram-notify.sh
