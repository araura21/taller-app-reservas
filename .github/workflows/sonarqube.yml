name: SonarQube SAST Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analisis SAST
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Obtener archivos modificados
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD | head -15)
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            FILES=$(git diff --name-only "${{ github.event.before }}" HEAD | head -15)
          else
            FILES=$(git show --name-only --pretty=format: HEAD | head -15)
          fi
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Instalar dependencias
        run: |
          cd auth-service && npm install --ignore-scripts
          cd ../booking-service && npm install --ignore-scripts
          cd ../user-service && npm install --ignore-scripts
          cd ../notification-service && npm install --ignore-scripts
          cd ../frontend && npm install --ignore-scripts

      - name: Esperar SonarQube
        run: |
          for i in {1..60}; do
            STATUS=$(curl -sf http://localhost:9000/api/system/status 2>/dev/null | jq -r '.status' 2>/dev/null || echo "waiting")
            [ "$STATUS" = "UP" ] && break
            sleep 5
          done
          curl -sf http://localhost:9000/api/system/status | grep -q "UP" || exit 1

      - name: Configurar Quality Gate StrictGate
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u "admin:admin" -d "name=ci-token-${GITHUB_RUN_ID}&type=GLOBAL_ANALYSIS_TOKEN")
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token // empty')
          [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ] && sleep 10 && \
            TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u "admin:admin" -d "name=ci-token-${GITHUB_RUN_ID}&type=GLOBAL_ANALYSIS_TOKEN") && \
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token // empty')
          [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ] && echo "No se pudo generar token" && exit 1
          echo "SONAR_TOKEN=$TOKEN" >> "$GITHUB_ENV"

          QG_ID=$(curl -s -X POST "http://localhost:9000/api/qualitygates/create" \
            -u "admin:admin" -d "name=StrictGate" | jq -r '.id')
          if [ "$QG_ID" = "null" ] || [ -z "$QG_ID" ]; then
            QG_ID=$(curl -s "http://localhost:9000/api/qualitygates/list" -u "admin:admin" \
              | jq -r '.qualitygates[] | select(.name=="StrictGate") | .id')
          fi

          if [ -n "$QG_ID" ] && [ "$QG_ID" != "null" ]; then
            CONDITIONS=$(curl -s "http://localhost:9000/api/qualitygates/show?id=$QG_ID" -u "admin:admin" | jq -r '.conditions[]?.id')
            for cond in $CONDITIONS; do
              curl -s -X POST "http://localhost:9000/api/qualitygates/delete_condition" \
                -u "admin:admin" -d "id=$cond" > /dev/null
            done
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=blocker_violations&op=GT&error=0"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=critical_violations&op=GT&error=0"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=major_violations&op=GT&error=5"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=security_hotspots_reviewed&op=LT&error=100"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=coverage&op=LT&error=80"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=duplicated_lines_density&op=GT&error=3"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=sqale_debt_ratio&op=GT&error=2.5"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=complexity&op=GT&error=50"
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=cognitive_complexity&op=GT&error=30"
            curl -s -X POST "http://localhost:9000/api/qualitygates/set_as_default" -u "admin:admin" -d "id=$QG_ID"
          fi

      - name: Ejecutar SonarQube Scan
        id: scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_SCANNER_OPTS: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.projectKey=taller-app-reservas
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/dist/**

      - name: Listar archivos indexados
        if: always()
        run: |
          echo "=== Scan outcome: ${{ steps.scan.outcome }} ==="
          curl -s "http://localhost:9000/api/components/tree?component=taller-app-reservas&qualifiers=FIL&ps=500" \
            -u "admin:admin" | jq -r '.components[].path' | sort | head -30
          TOTAL=$(curl -s "http://localhost:9000/api/components/tree?component=taller-app-reservas&qualifiers=FIL&ps=500" \
            -u "admin:admin" | jq '.components | length')
          echo "Total archivos indexados: $TOTAL"

      - name: Obtener metricas y notificar Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || 'CI run' }}
          CHANGED_FILES: ${{ steps.files.outputs.changed_files }}
          ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          chmod +x tools/fetch-sonar-metrics.sh tools/telegram-notify.sh
          ./tools/fetch-sonar-metrics.sh http://localhost:9000 taller-app-reservas admin admin
          set -a && source sonar-metrics.env && set +a

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # Reporte SAST — Taller App Reservas
          ## Quality Gate: **${STATUS_TXT}**
          | Métrica | Valor |
          |---|---|
          | Bugs | **${METRICS_BUGS}** |
          | Vulnerabilidades | **${METRICS_VULNS}** |
          | Code Smells | **${METRICS_SMELLS}** |
          | Líneas de código | **${METRICS_LINES}** |
          | Duplicación | **${METRICS_DUPL}%** |
          EOF

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            ./tools/telegram-notify.sh
          else
            echo "Secrets Telegram no configurados."
          fi

      - name: Fallar si el Quality Gate no se cumple
        if: always()
        run: |
          if [ "${{ env.SONAR_QUALITY_GATE_STATUS }}" != "OK" ]; then
            echo "Quality Gate FAILED (esperado con orders-service demo)."
            exit 1
          fi
