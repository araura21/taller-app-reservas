# Configuración central de SonarQube para el monorepo ReservasEC.
# Modifica sonar.sources si añades o quitas microservicios.

sonar.projectKey=reservas-ec
sonar.projectName=ReservasEC
sonar.projectVersion=1.0

# Directorios analizados (excluye node_modules vía sonar.exclusions)
sonar.sources=\
  auth-service/src,\
  booking-service/src,\
  user-service,\
  notification-service,\
  frontend/src,\
  orders-service/src

sonar.tests=\
  auth-service/src,\
  booking-service/src,\
  orders-service/src

sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/Dockerfile

sonar.javascript.lcov.reportPaths=\
  auth-service/coverage/lcov.info,\
  booking-service/coverage/lcov.info,\
  orders-service/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# El pipeline CI espera a que el Quality Gate termine antes de finalizar
sonar.qualitygate.wait=true
